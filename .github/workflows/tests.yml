name: goamqp

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
   tests:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq@sha256:9de92946751becfd843f47322d28b7d58d525f5bbb39694b03b66740f4915f6b
        env:
          RABBITMQ_DEFAULT_USER: user
          RABBITMQ_DEFAULT_PASS: password
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: 'stable'
          check-latest: true
      - name: Tests
        run: |
          go test -p 1 -mod=readonly -race -v -tags integration -coverprofile=coverage.txt -covermode=atomic -coverpkg=$(go list ./... | tr '\n' , | sed 's/,$//') ./...
          go tool cover -func=coverage.txt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ./coverage.txt
          fail_ci_if_error: true
          flags: tests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
