name: goamqp

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
   tests:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq@sha256:9eb488eb2457ee51d281e907fa0263482a57ad033f2acb85d67e0b5a2ce1ed92
        env:
          RABBITMQ_DEFAULT_USER: user
          RABBITMQ_DEFAULT_PASS: password
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          check-latest: true
      - name: Tests
        run: |
          go test -p 1 -mod=readonly -race -v -tags integration -coverprofile=coverage.txt -covermode=atomic -coverpkg=$(go list ./... | tr '\n' , | sed 's/,$//') ./...
          go tool cover -func=coverage.txt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: ./coverage.txt
          fail_ci_if_error: true
          flags: tests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
