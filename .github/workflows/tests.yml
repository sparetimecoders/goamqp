name: goamqp

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
   tests:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq@sha256:63a4b7bf7fb0b620b4e8ea69f6288462af55f80e97f59521f9011e7253ab3817
        env:
          RABBITMQ_DEFAULT_USER: user
          RABBITMQ_DEFAULT_PASS: password
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          check-latest: true
      - name: Tests
        run: |
          go test -p 1 -mod=readonly -race -v -tags integration -coverprofile=coverage.txt -covermode=atomic -coverpkg=$(go list ./... | tr '\n' , | sed 's/,$//') ./...
          go tool cover -func=coverage.txt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: ./coverage.txt
          fail_ci_if_error: true
          flags: tests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
